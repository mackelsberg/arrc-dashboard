<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--arrc-paper); font-family: var(--font-sans); }
  .card { width:700px; padding: 20px 24px; box-sizing:border-box; display:flex; align-items:center; gap: 12px; flex-wrap:wrap; }
  .btn { font-family: var(--font-sans); font-weight: 500; font-size: 13px; padding: 10px 16px; border-radius: 6px; border: 1px solid transparent; cursor: pointer; line-height: 1; transition: background var(--dur-fast) var(--ease-standard); }
  .btn.primary { background: var(--arrc-navy); color: #fff; }
  .btn.primary:hover { background: var(--arrc-navy-deep); }
  .btn.secondary { background: transparent; color: var(--arrc-navy); border-color: var(--arrc-ink-300); }
  .btn.secondary:hover { background: var(--arrc-paper-2); }
  .btn.ghost { background: transparent; color: var(--arrc-navy); }
  .btn.ghost:hover { background: var(--arrc-paper-2); }
  .btn.accent { background: var(--arrc-red); color:#fff; }
  .btn.accent:hover { background: var(--arrc-red-deep); }
  .tag { display:inline-flex; align-items:center; gap:6px; font-size: 11px; padding: 4px 10px; border-radius: 999px; background: var(--arrc-purple-tint); color: var(--arrc-purple); font-weight:500; }
  .tag.o { background: var(--arrc-orange-tint); color: var(--arrc-orange); }
  .tag.t { background: var(--arrc-teal-tint); color: var(--arrc-teal); }
</style></head>
<body>
<div class="card">
  <button class="btn primary">Download PDF</button>
  <button class="btn secondary">Share report</button>
  <button class="btn ghost">Cancel</button>
  <button class="btn accent">Submit proposal</button>
  <span class="tag">Founding</span>
  <span class="tag o">Funded</span>
  <span class="tag t">Partner</span>
</div>
</body></html>
