<!doctype html>
<html><head>
<meta charset="utf-8">
<title>ARRC Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--arrc-paper); font-family: var(--font-sans); }
  .card { width:700px; height:160px; display:grid; grid-template-columns: 1.3fr 1fr; align-items:center; padding:0 28px; gap:32px; box-sizing:border-box; }
  .lockup img { height: 110px; width:auto; display:block; }
  .alt { display:flex; align-items:center; justify-content:center; background: var(--arrc-navy); border-radius: 8px; height: 128px; }
  .alt img { height: 96px; width:auto; display:block; }
</style></head>
<body>
<div class="card">
  <div class="lockup">
    <img src="../assets/arrc-logo-with-name.png" alt="ARRC · Accountability &amp; Reform Research Consortium">
  </div>
  <div class="alt"><img src="../assets/arrc-logo-white.png" alt="ARRC mark on navy"></div>
</div>
</body></html>
