<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Map dots</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--arrc-paper); font-family: var(--font-sans); }
  .card { width:700px; padding: 16px 24px; box-sizing:border-box; display:grid; grid-template-columns: 1fr; gap:14px; }
  .row { display:flex; align-items:center; gap: 28px; flex-wrap:wrap; }
  .item { display:flex; align-items:center; gap:10px; font-size: 12px; color: var(--color-text-secondary); }
  .item b { color: var(--color-text-primary); font-weight:500; }
  .dot-f { width:14px; height:14px; border-radius:50%; background: var(--arrc-purple); border: 1.5px solid #fff; box-shadow: 0 0 0 0.5px rgba(0,0,0,.15); }
  .dot-p { width:14px; height:14px; border-radius:50%; background: var(--arrc-orange); border: 1.5px solid #fff; box-shadow: 0 0 0 0.5px rgba(0,0,0,.15); }
  .dot-b { width:14px; height:14px; border-radius:50%; background: linear-gradient(90deg, var(--arrc-purple) 50%, var(--arrc-orange) 50%); border: 1.5px solid #fff; box-shadow: 0 0 0 0.5px rgba(0,0,0,.15); }
  .cluster { width:22px; height:22px; border-radius:50%; background: linear-gradient(90deg, var(--arrc-purple) 50%, var(--arrc-orange) 50%); border: 1.5px solid #fff; display:flex; align-items:center; justify-content:center; font-size:11px; color:#fff; font-weight:600; box-shadow: 0 0 0 0.5px rgba(0,0,0,.15); }
  .tip { background: #fff; border: 0.5px solid var(--arrc-ink-200); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--color-text-primary); line-height:1.5; box-shadow: 0 2px 8px rgba(0,0,0,0.06); max-width: 320px; }
  .tip strong { font-weight:600; }
  .tip .m { color: var(--color-text-secondary); }
</style></head>
<body>
<div class="card">
  <div class="row">
    <div class="item"><span class="dot-f"></span><b>Founding member</b></div>
    <div class="item"><span class="dot-p"></span><b>Funded project host</b></div>
    <div class="item"><span class="dot-b"></span><b>Both roles</b></div>
    <div class="item"><span class="cluster">3</span><b>Cluster · count</b></div>
  </div>
  <div class="tip">
    <strong>Atlanta, GA</strong><br>
    · Georgia State University <span class="m">— founding member; funded: Jung Won Choi</span><br>
    · Georgia Tech <span class="m">— funded: Jung Won Choi</span>
  </div>
</div>
</body></html>
