<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Milestones</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--arrc-paper); font-family: var(--font-sans); }
  .card { width:700px; padding: 18px 24px; box-sizing:border-box; }
  .label { font-size: 13px; font-weight: 500; margin-bottom: 10px; color: var(--color-text-primary); }
  .box { background: var(--arrc-paper-2); border-radius: 8px; padding: 10px 16px; font-size: 13px; color: var(--color-text-secondary); line-height: 1.8; }
  .row { display:flex; justify-content: space-between; }
  .row b { color: var(--color-text-primary); font-weight: 500; }
</style></head>
<body>
<div class="card">
  <div class="label">Upcoming milestones</div>
  <div class="box">
    <div class="row"><span>May 11, 2026</span><b>Draft Federal Exit Survey report</b></div>
    <div class="row"><span>May 31, 2026</span><b>W&amp;E research deliverables</b></div>
    <div class="row"><span>Jun 4–6, 2026</span><b>Public Management Research Conference</b></div>
    <div class="row"><span>Aug 30, 2026</span><b>GC research deliverables</b></div>
  </div>
</div>
</body></html>
