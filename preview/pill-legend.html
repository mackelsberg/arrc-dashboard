<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Pill legend &amp; outline cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--arrc-paper); font-family: var(--font-sans); }
  .card { width:700px; padding: 16px 24px; box-sizing:border-box; display:grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .tile { background: #fff; border: 0.5px solid var(--arrc-ink-200); border-radius: 8px; padding: 14px 16px; }
  .k { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .v { display:flex; align-items:baseline; gap: 8px; }
  .v b { font-family: var(--font-serif); font-weight: 500; font-size: 22px; line-height:1; color: var(--color-text-primary); font-feature-settings: 'lnum','tnum'; }
  .v span { font-size: 12px; color: var(--color-text-secondary); }
</style></head>
<body>
<div class="card">
  <div class="tile"><div class="k">CoP meetings</div><div class="v"><b>5</b><span>across W&amp;E and GC</span></div></div>
  <div class="tile"><div class="k">Webinars</div><div class="v"><b>2</b><span>40+ attendees each</span></div></div>
  <div class="tile"><div class="k">Conference presentations</div><div class="v"><b>2</b><span>ASPA, Democracy Forward</span></div></div>
  <div class="tile"><div class="k">Newsletter issues</div><div class="v"><b>1</b><span>Issue 2 in production</span></div></div>
</div>
</body></html>
