<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Stat cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--arrc-paper); font-family: var(--font-sans); }
  .card { width:700px; padding: 18px 24px; box-sizing:border-box; display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .tile { background: var(--arrc-paper-2); border-radius: 8px; padding: 14px 16px; }
  .k { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
  .v { font-family: var(--font-serif); font-weight: 500; font-size: 34px; line-height:1; color: var(--color-text-primary); font-feature-settings: 'lnum','tnum'; }
  .v.em { color: var(--arrc-purple); }
</style></head>
<body>
<div class="card">
  <div class="tile"><div class="k">Funded projects</div><div class="v em">17</div></div>
  <div class="tile"><div class="k">Funding secured</div><div class="v">$230K</div></div>
  <div class="tile"><div class="k">Researchers in network</div><div class="v">273</div></div>
  <div class="tile"><div class="k">Institutions</div><div class="v">107</div></div>
</div>
</body></html>
