<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Type display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--arrc-paper); }
  .card { width:700px; padding: 20px 28px; box-sizing:border-box; }
  .disp { font-family: var(--font-serif); font-weight:600; font-size: 56px; line-height:1.02; letter-spacing:-0.02em; color: var(--arrc-navy); margin:0 0 6px; }
  .sub  { font-family: var(--font-sans); font-size: 13px; color: var(--color-text-secondary); letter-spacing: 0.02em; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-tertiary); margin-top: 10px; }
</style></head>
<body>
<div class="card">
  <h1 class="disp">Year one, by the&nbsp;numbers.</h1>
  <div class="sub">Source Serif 4 · Display · 56 / 58 · -0.02em · navy #1E2A4A</div>
  <div class="meta">.arrc-display — foundation-report headlines and page titles</div>
</div>
</body></html>
