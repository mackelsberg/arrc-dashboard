<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--arrc-paper); }
  .card { width:700px; padding: 16px 24px; box-sizing:border-box; font-family: var(--font-sans); }
  .row { display:grid; grid-template-columns: 1fr 170px; align-items: baseline; border-bottom: 1px solid var(--arrc-ink-100); padding: 8px 0; }
  .row:last-child { border:0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-tertiary); text-align:right; }
  .h1 { font-family: var(--font-serif); font-weight:600; font-size: 40px; line-height:1.1; letter-spacing:-0.015em; color: var(--arrc-navy); }
  .h2 { font-family: var(--font-serif); font-weight:600; font-size: 28px; line-height:1.2; color: var(--arrc-navy); }
  .h3 { font-weight:600; font-size: 20px; line-height:1.3; color: var(--color-text-primary); }
  .body { font-size: 15px; line-height:1.55; color: var(--color-text-primary); }
  .sm { font-size: 13px; color: var(--color-text-secondary); }
  .ovr { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight:600; color: var(--color-text-secondary); }
</style></head>
<body>
<div class="card">
  <div class="row"><div class="h1">ARRC year one</div><div class="meta">h1 · serif 40/44</div></div>
  <div class="row"><div class="h2">Research pipeline</div><div class="meta">h2 · serif 28/34</div></div>
  <div class="row"><div class="h3">Funding sources</div><div class="meta">h3 · sans 20/26 · 600</div></div>
  <div class="row"><div class="body">48 proposals received across W&amp;E, GC, and SSI.</div><div class="meta">body · sans 15/23</div></div>
  <div class="row"><div class="sm">35% selection rate · 17 projects funded</div><div class="meta">body-sm · 13/20</div></div>
  <div class="row"><div class="ovr">Founding members</div><div class="meta">overline · 10 · 0.14em</div></div>
</div>
</body></html>
